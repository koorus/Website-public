<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enduring Creatures</title>

  <style>
    body {
      margin: 0;
      background: #d3d3d3;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .page {
      width: 90vw;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    

    /* Back button */
    .back-btn {
      position: fixed;
      top: 260px;
      left: 4px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(120, 120, 161, 0.4);
      backdrop-filter: blur(4px);
      border: none;
      cursor: pointer;
      font-size: 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.35);
      z-index: 1000;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .back-btn:hover {
      background: #a9a9a9;
      transform: translateY(-1px);
    }

    .back-btn:active {
      transform: translateY(0);
    }

    /* Preview */
    .preview {
      background: #d3d3d3;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-height: 70vh;
    }

    .preview img {
      max-width: 100%;
      max-height: 65vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 10px 10px 25px rgba(0, 0, 0, 0.45);
    }

    /* Navigation buttons */
    .nav-buttons {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      width: 20%;
      max-width: 400px;
    }

    .nav-buttons button {
      flex: 1;
      padding: 5px;
      margin: 0 6px;
      border: none;
      border-radius: 6px;
      background: #bfbfbf;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 4px 4px 10px rgba(0,0,0,0.25);
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .nav-buttons button:hover {
      background: #a9a9a9;
      transform: translateY(-1px);
    }

    .nav-buttons button:active {
      transform: translateY(0);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
    }

    .thumb {
      background: #e6e6e6;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb:hover {
      transform: scale(1.04);
      box-shadow: 6px 6px 14px rgba(0, 0, 0, 0.35);
    }

    .thumb.active {
      outline: 2px solid #333;
    }

    @media (max-width: 600px) {
      .back-btn {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

<div class="page">

  <button class="back-btn" onclick="history.back()">&#8592;</button>
  <!-- Preview -->
  <div class="preview">
    <img id="previewImage" src="Oct2023-F33-Elora_138.jpg" alt="Preview" />
    <div class="nav-buttons">
      <button id="prevBtn">⟵</button>
      <button id="nextBtn">⟶</button>
    </div>
  </div>

  <!-- Thumbnails -->
  <div class="grid">
    <div class="thumb active"><img src="Oct2023-F33-Elora_138.jpg" /></div>
    <div class="thumb"><img src="2021-d850_D851921.jpg" /></div>
    <div class="thumb"><img src="fw2023_D705043.jpg" /></div>
    <div class="thumb"><img src="Oct2022-BW-F31gorge-laurel_93.jpg" /></div>
    <div class="thumb"><img src="FW2024_D853644.jpg" /></div>
    <div class="thumb"><img src="FW2024_D853646.jpg" /></div>
    <div class="thumb"><img src="F2018-2_DSC0243.jpg" /></div>
    <div class="thumb"><img src="WS2021_D703509.jpg" /></div>
    <div class="thumb"><img src="Dec2022-F37Fall-waterloo_201.jpg" /></div>
    <div class="thumb"><img src="mar2022badlands5.jpg" /></div>
    <div class="thumb"><img src="F62-F2025Untitled-6.jpg" /></div>
    <div class="thumb"><img src="F42-F2023Untitled-8.jpg" /></div>
    <div class="thumb"><img src="F62-F2025Untitled-4.jpg" /></div>
    <div class="thumb"><img src="2020_D851284.jpg" /></div>
    <div class="thumb"><img src="w2024_D853682.jpg" /></div>
    <div class="thumb"><img src="d850_D853618.jpg" /></div>
    <div class="thumb"><img src="d850_D853623.jpg" /></div>
    <div class="thumb"><img src="WS2020-djiDJI_0701.jpg" /></div>
    <div class="thumb"><img src="FW2024_D853720.jpg" /></div>
    <div class="thumb"><img src="F62-F2025Untitled-9.jpg" /></div>
    <div class="thumb"><img src="WS2020-djiDJI_0527.jpg" /></div>
    <div class="thumb"><img src="WS2023-d850_D853590.jpg" /></div>
    <div class="thumb"><img src="WS2021_DSC2423.jpg" /></div>
    <div class="thumb"><img src="F2019-d850_D851100.jpg" /></div>
  </div>
 <h5>Koorus Bookan © 2026</h5>
</div>

<script>
  const preview = document.getElementById('previewImage');
  const thumbs = Array.from(document.querySelectorAll('.thumb'));
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  let currentIndex = 0;

  function updatePreview(index) {
    currentIndex = (index + thumbs.length) % thumbs.length;

    thumbs.forEach(t => t.classList.remove('active'));
    thumbs[currentIndex].classList.add('active');

    preview.src = thumbs[currentIndex].querySelector('img').src;
  }

  thumbs.forEach((thumb, index) => {
    thumb.addEventListener('click', () => {
      updatePreview(index);
    });
  });

  prevBtn.addEventListener('click', () => {
    updatePreview(currentIndex - 1);
  });

  nextBtn.addEventListener('click', () => {
    updatePreview(currentIndex + 1);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') updatePreview(currentIndex - 1);
    if (e.key === 'ArrowRight') updatePreview(currentIndex + 1);
  });
</script>

            
</body>
</html>
